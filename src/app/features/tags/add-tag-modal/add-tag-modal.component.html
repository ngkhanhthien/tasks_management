<div class="fixed inset-0 bg-black/20 flex items-center justify-center z-[1000] animate-in fade-in duration-200">
  <div class="bg-white rounded-3xl shadow-xl w-full max-w-[420px] p-6 space-y-5 animate-in zoom-in-95 duration-200">
    <!-- Header -->
    <div class="flex items-center justify-between">
      <h2 class="text-[22px] font-bold text-[#222]">Add Tags</h2>
      <button (click)="onClose()" class="text-gray-300 hover:text-gray-500 transition-colors">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="space-y-4 pt-2">
      <!-- Tag Name Input -->
      <div class="relative group">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01" />
          </svg>
        </div>
        <input 
          type="text" 
          [ngModel]="tagName()"
          (ngModelChange)="tagName.set($event)"
          [ngModelOptions]="{standalone: true}"
          placeholder="Name" 
          class="w-full pl-12 pr-4 py-3 bg-white border-2 border-pink-100 rounded-2xl focus:outline-none focus:border-pink-200 transition-all text-lg placeholder:text-gray-200"
          (keyup.enter)="onSave()"
          autofocus
        />
      </div>

      <!-- Color Selector Row -->
      <div class="flex items-center">
        <label class="w-24 text-[16px] text-[#444] shrink-0">Color</label>
        <div class="flex flex-1 items-center gap-2">
          <!-- None Color Option -->
          <button 
            (click)="selectColor('transparent')"
            class="w-5 h-5 rounded-full border border-gray-200 flex items-center justify-center relative hover:scale-110 transition-transform"
          >
            <div class="w-[1px] h-3 bg-red-400 rotate-45"></div>
            @if (selectedColor() === 'transparent') {
              <div class="absolute -inset-[3px] border-2 border-yellow-400 rounded-full"></div>
            }
          </button>

          @for (color of colors; track color) {
            <button 
              (click)="selectColor(color)"
              [style.backgroundColor]="color"
              class="w-5 h-5 rounded-full transition-transform active:scale-90 hover:scale-110 relative"
            >
              @if (selectedColor() === color) {
                <div class="absolute -inset-[3px] border-2 border-yellow-400 rounded-full"></div>
              }
            </button>
          }
          
          <!-- Gradient/Custom Color -->
          <button class="w-5 h-5 rounded-full bg-gradient-to-tr from-pink-400 via-blue-400 to-green-400 hover:scale-110 transition-transform"></button>
        </div>
      </div>

      <!-- Parent Tag Selector Row -->
      <div class="flex items-center">
        <label class="w-24 text-[16px] text-[#444] shrink-0">Parent Tag</label>
        <div class="relative flex-1">
          <select 
            [ngModel]="parentTag()"
            (ngModelChange)="parentTag.set($event)"
            class="w-full px-4 py-2 bg-white border border-gray-100 rounded-xl focus:outline-none focus:ring-1 focus:ring-gray-200 transition-all text-[15px] appearance-none cursor-pointer text-[#444]"
          >
            <option value="None">None</option>
            @for (parent of tagsStore.rootTags(); track parent.id) {
              <option [value]="parent.id">{{ parent.name }}</option>
            }
          </select>
          <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
            <svg viewBox="0 0 24 24" class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 pt-4">
      <button 
        (click)="onClose()" 
        class="px-10 py-2.5 text-[18px] font-medium text-gray-500 hover:bg-gray-50 rounded-2xl transition-colors border border-gray-100"
      >
        Close
      </button>
      <button 
        (click)="onSave()"
        [disabled]="!tagName().trim()"
        class="px-12 py-2.5 text-[18px] font-bold text-white bg-pink-400 hover:bg-pink-500 disabled:opacity-50 disabled:cursor-not-allowed rounded-2xl transition-all shadow-md shadow-pink-100 active:scale-95"
      >
        Save
      </button>
    </div>
  </div>
</div>
