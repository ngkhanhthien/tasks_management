<div class="flex flex-col h-full py-4">
  <!-- Profile/Logo -->
  <div class="px-4 mb-8">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-blue-500"></div>
      <span class="font-bold text-lg">TickTick Clone</span>
    </div>
  </div>

  <!-- Main Menus -->
  <nav class="flex-1 overflow-y-auto px-2">
    <div class="space-y-1">
      @for (menu of mainMenus; track menu.id) {
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-md hover:bg-slate-200 text-sm transition-colors">
          <span class="material-icons text-slate-500">{{ menu.icon }}</span>
          <span class="flex-1">{{ menu.name }}</span>
          @if (menu.count > 0) {
            <span class="text-xs text-slate-400">{{ menu.count }}</span>
          }
        </a>
      }
    </div>

    <!-- Lists Section -->
    <div class="mt-8">
      <div class="px-3 flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Lists</span>
        <button class="material-icons text-xs text-slate-400 hover:text-slate-600">add</button>
      </div>
      <div class="space-y-1">
        @for (list of lists(); track list.id) {
          <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-md hover:bg-slate-200 text-sm transition-colors">
            <span class="w-2 h-2 rounded-full" [style.background-color]="list.color || '#cbd5e1'"></span>
            <span class="flex-1 truncate">{{ list.name }}</span>
          </a>
        }
      </div>
    </div>
  </nav>

  <!-- Bottom Actions -->
  <div class="px-4 mt-auto">
    <button class="flex items-center gap-3 w-full px-3 py-2 rounded-md hover:bg-slate-200 text-sm transition-colors text-slate-600">
      <span class="material-icons">settings</span>
      <span>Settings</span>
    </button>
  </div>
</div>
