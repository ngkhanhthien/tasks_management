<div class="sidebar-container">
  <div class="nav-bar">
    <div class="nav-top">
      <div class="avatar-container">
        <div class="avatar">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" />
        </div>
      </div>

      <nav class="nav-items">
        <button class="nav-item" [class.active]="navService.activeApp() === 'tasks'" (click)="setApp('tasks')"
          title="Tasks">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5" />
          </svg>
        </button>
        <button class="nav-item" [class.active]="navService.activeApp() === 'calendar'" (click)="setApp('calendar')"
          title="Calendar">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </button>
        <button class="nav-item" [class.active]="navService.activeApp() === 'matrix'" (click)="setApp('matrix')"
          title="Eisenhower Matrix">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M4 4h7v7H4V4zm9 0h7v7h-7V4zm0 9h7v7h-7v-7zm-9 0h7v7H4v-7z" />
          </svg>
        </button>
        <button class="nav-item" [class.active]="navService.activeApp() === 'pomodoro'" (click)="setApp('pomodoro')"
          title="Pomodoro">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
        <button class="nav-item" [class.active]="navService.activeApp() === 'habit'" (click)="setApp('habit')"
          title="Habit">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </button>
        <button class="nav-item" [class.active]="navService.activeApp() === 'search'" (click)="setApp('search')"
          title="Search">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
      </nav>
    </div>

    <div class="nav-bottom">
      <button class="nav-item" [class.active]="navService.activeApp() === 'sync'" (click)="setApp('sync')" title="Sync">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 2v6h-6" />
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
          <path d="M3 22v-6h6" />
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
        </svg>
      </button>
      <button class="nav-item" [class.active]="navService.activeApp() === 'notification'" (click)="setApp('notification')"
        title="Notifications">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </button>
      <button class="nav-item" [class.active]="navService.activeApp() === 'settings'" (click)="setApp('settings')"
        title="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
      <button class="nav-item" [class.active]="navService.activeApp() === 'more'" (click)="setApp('more')" title="More">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </button>
    </div>
  </div>

  <div class="list-bar w-[250px] flex flex-col bg-[#fefafa] h-full overflow-hidden"
    *ngIf="navService.activeApp() === 'tasks'">
    <div class="flex-1 overflow-y-auto px-2 py-4 space-y-6">
      <!-- Smart Lists -->
      <div class="space-y-1">
        <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-black/5 cursor-pointer text-[#555]">
          <div class="flex items-center gap-3">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <path d="M16 2v4M8 2v4M3 10h18" />
              <circle cx="12" cy="14" r="2" />
            </svg>
            <span class="text-sm font-medium">Today</span>
          </div>
          <span class="text-xs text-gray-400 group-hover:text-gray-600">0</span>
        </div>
        <div class="group flex items-center justify-between p-2 rounded-lg hover:bg-black/5 cursor-pointer text-[#555]">
          <div class="flex items-center gap-3">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15.46V10a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3.54" />
              <path d="M16 2v4M8 2v4M3 10h18" />
            </svg>
            <span class="text-sm font-medium">Next 7 Days</span>
          </div>
          <span class="text-xs text-gray-400 group-hover:text-gray-600">0</span>
        </div>
        <div class="group flex items-center justify-between p-2 rounded-lg bg-pink-100/50 cursor-pointer text-[#555]">
          <div class="flex items-center gap-3">
            <svg viewBox="0 0 24 24" class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 12H2l3.38-9H18.6L22 12z" />
              <path d="M2 12l3 9h14l3-9" />
              <path d="M12 12v9" />
            </svg>
            <span class="text-sm font-medium">Inbox</span>
          </div>
          <span class="text-xs text-gray-400 group-hover:text-gray-600">0</span>
        </div>
      </div>

      <!-- Lists -->
      <div class="space-y-1">
        <h3 class="px-2 text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-1">Lists</h3>
        <div class="flex items-center justify-between p-2 rounded-lg hover:bg-black/5 cursor-pointer text-[#555]">
          <div class="flex items-center gap-3">
            <span class="w-2.5 h-2.5 rounded-sm bg-yellow-400"></span>
            <span class="text-sm">list_1</span>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="space-y-1">
        <h3 class="px-2 text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-1">Filters</h3>
        <div class="p-2 text-xs text-gray-400 italic px-3">
          Display tasks filtered by list, date, priority, tag, and more
        </div>
      </div>

      <!-- Tags -->
      <div class="space-y-1">
        <h3 class="px-2 text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-1">Tags</h3>
        <div class="flex items-center justify-between p-2 rounded-lg hover:bg-black/5 cursor-pointer text-[#555]">
          <div class="flex items-center gap-3">
            <svg viewBox="0 0 24 24" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor"
              stroke-width="2.5">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82zM7 7h.01" />
            </svg>
            <span class="text-sm">tag_1</span>
          </div>
          <span class="w-2 h-2 rounded-full bg-blue-400"></span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="p-2 border-t border-gray-100 bg-[#fdf2f2]/50">
      <div class="flex items-center gap-2 p-2 rounded-lg hover:bg-black/5 cursor-pointer text-gray-500">
        <svg viewBox="0 0 24 24" class="w-4 h-4 text-amber-500" fill="currentColor">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
        <span class="text-xs font-semibold">Upgrade to Premium</span>
      </div>
    </div>
  </div>
</div>
