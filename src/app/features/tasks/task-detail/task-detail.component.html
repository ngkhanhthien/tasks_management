@if (selectedTask(); as task) {
  <div class="flex flex-col h-full bg-white animate-in slide-in-from-right-4 duration-200">
    <!-- Header: Date & Priority -->
    <div class="flex items-center justify-between px-6 py-3 border-b border-gray-100/60">
      <div class="flex items-center gap-4">
        <!-- Date Trigger (UI Only for now) -->
        <button class="flex items-center gap-2 text-blue-500 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-colors group">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="3.5" ry="3.5" />
            <path d="M16 2v4M8 2v4M3 10h18" />
            <text x="12" y="17" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">{{ task.dueDate ? task.dueDate.getDate() : '-' }}</text>
          </svg>
          <span class="text-[13px] font-semibold tracking-wide">
            {{ task.dueDate ? (task.dueDate | date:'mediumDate') : 'No Date' }}{{ task.dueTime ? ', ' + task.dueTime : '' }}
          </span>
        </button>
      </div>

      <div class="flex items-center gap-1.5 text-gray-400">
        <!-- Priority Flag -->
        <button class="hover:text-blue-500 p-2 rounded-lg hover:bg-gray-50 transition-colors">
          <svg viewBox="0 0 24 24" class="w-5 h-5 transition-colors" [class.text-blue-600]="task.priority === 'none'" [class.text-red-500]="task.priority === 'high'" fill="currentColor">
            <path d="M4 2v20M4 4l16 6-16 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <!-- Close Button -->
        <button class="hover:text-gray-600 p-1.5 rounded-lg hover:bg-gray-50 transition-colors" (click)="closeDetail()">
          <svg viewBox="0 0 24 24" class="w-[20px] h-[20px]" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
    
    <!-- Content Editor -->
    <div class="flex-1 overflow-y-auto px-8 py-6 custom-scrollbar">
      <!-- Title -->
      <div class="flex items-start gap-4 mb-4">
        <div class="w-5 h-5 rounded border-2 border-gray-300 mt-1.5 flex-shrink-0 cursor-pointer hover:border-gray-400 transition-colors"></div>
        <input 
          [ngModel]="task.title"
          (ngModelChange)="updateTitle($event)"
          class="w-full text-[20px] font-bold text-gray-800 placeholder-gray-400 outline-none bg-transparent focus:ring-0" 
          placeholder="Task Name"
        />
      </div>

      <!-- Checklist / Subtasks -->
      <div class="mb-8 space-y-3">
        <div class="flex items-center gap-4 text-gray-600 group">
          <div class="w-4 h-4 rounded border border-gray-300 flex-shrink-0"></div>
          <span class="text-[14px]">aaa</span>
        </div>
        <div class="flex items-center gap-4 text-gray-400">
          <div class="w-4 h-4 rounded border border-dashed border-gray-300 flex-shrink-0"></div>
          <input class="flex-1 text-[14px] outline-none bg-transparent placeholder-gray-300" placeholder="Add subtask" />
        </div>
      </div>

      <!-- Description / Note Area -->
      <div class="relative group mb-8">
        <svg viewBox="0 0 24 24" class="absolute -left-7 top-1 w-[18px] h-[18px] text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="21" y1="10" x2="3" y2="10" /><line x1="21" y1="6" x2="3" y2="6" /><line x1="21" y1="14" x2="3" y2="14" /><line x1="21" y1="18" x2="3" y2="18" />
        </svg>
        <textarea 
          [ngModel]="task.description || ''"
          (ngModelChange)="updateDescription($event)"
          class="w-full text-[14px] font-medium text-gray-600 placeholder-gray-300 outline-none bg-transparent resize-none min-h-[120px] leading-relaxed focus:ring-0" 
          placeholder="Add description..."
        ></textarea>
      </div>

      <!-- Tags Section -->
      <div class="flex flex-wrap gap-2 items-center">
        <span class="inline-flex items-center gap-1.5 px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-[12px] font-medium hover:bg-gray-200 transition-colors cursor-pointer">
          <svg viewBox="0 0 24 24" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" /></svg>
          good
        </span>
        <button class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-all">
          <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
        </button>
      </div>
    </div>
    
    <!-- Footer Actions -->
    <div class="px-6 py-3 border-t border-gray-100/60 flex items-center justify-between">
      <div class="flex items-center gap-2 text-gray-500 hover:text-gray-700 cursor-pointer group">
        <svg viewBox="0 0 24 24" class="w-4 h-4 text-gray-400 group-hover:text-gray-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2" /><path d="M3 10h18"/><path d="M8 2v4m8-4v4"/></svg>
        <span class="text-[13px] font-semibold">Inbox</span>
      </div>

      <div class="flex items-center gap-0.5 text-gray-400">
        <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors hover:text-gray-600">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="p-2 hover:bg-gray-100 rounded-lg transition-colors hover:text-gray-600">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12h.01M12 12h.01M20 12h.01" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="h-full flex items-center justify-center bg-gray-50/10">
    <div class="text-center flex flex-col items-center gap-5 text-gray-300">
      <svg class="w-20 h-20 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.2">
        <rect x="3" y="4" width="18" height="16" rx="3" />
        <path d="M9 4v16M15 9l-3 3 3 3" />
      </svg>
      <p class="font-bold text-[14px] tracking-widest uppercase opacity-60">Select a task</p>
    </div>
  </div>
}
