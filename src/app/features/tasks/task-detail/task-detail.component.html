@if (selectedTask(); as task) {
  <div class="flex flex-col h-full bg-white animate-in slide-in-from-right-4 duration-200">
    <!-- Header Actions -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <div class="flex gap-2">
      </div>
      <div class="flex gap-2 text-gray-400">
        <button class="hover:text-gray-600 p-1.5 rounded-lg hover:bg-gray-50 transition-colors">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </button>
        <button class="hover:text-gray-600 p-1.5 rounded-lg hover:bg-gray-50 transition-colors" (click)="closeDetail()">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
    
    <!-- Content Editor -->
    <div class="flex-1 overflow-y-auto p-6">
      <input 
        [ngModel]="task.title"
        (ngModelChange)="updateTitle($event)"
        class="w-full text-2xl font-bold text-gray-800 placeholder-gray-400 outline-none bg-transparent mb-4 focus:ring-0" 
        placeholder="Task Title"
      />
      <textarea 
        [ngModel]="task.description || ''"
        (ngModelChange)="updateDescription($event)"
        class="w-full text-[15px] font-medium text-gray-600 placeholder-gray-400 outline-none bg-transparent resize-none min-h-[200px] leading-relaxed focus:ring-0" 
        placeholder="Description"
      ></textarea>
    </div>
    
    <!-- Footer Actions -->
    <div class="p-4 border-t border-gray-50 flex items-center justify-end text-xs font-semibold text-gray-400">
      <span>Updated {{ task.updatedAt | date:'shortTime' }}</span>
    </div>
  </div>
} @else {
  <div class="h-full flex items-center justify-center bg-gray-50/30">
    <div class="text-center flex flex-col items-center gap-4 text-gray-400">
      <svg class="w-16 h-16 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.99 22V22C6.468 22 2 17.532 2 12V6.012c0-.56.448-1.012 1.012-1.012H19.99c.56 0 1.012.448 1.012 1.012V12C21 17.532 16.532 22 11.99 22H11.99z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 11l2 2 4-4" />
      </svg>
      <p class="font-bold text-[13px] tracking-wide">Select a task to view details</p>
    </div>
  </div>
}
