<div [class.fixed]="isModal()" [class.inset-0]="isModal()" [class.z-[100]]="isModal()" 
     [class.flex]="isModal()" [class.items-center]="isModal()" [class.justify-center]="isModal()" 
     [class.pointer-events-none]="isModal()">
  
  <div class="w-[200px] bg-white rounded-[12px] shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 overflow-hidden flex flex-col py-1.5 animate-in pointer-events-auto"
       [class.z-50]="!isModal()"
       (click)="$event.stopPropagation()">
    
    <!-- Priority Section -->
    <div class="px-3 py-2 border-b border-gray-50 mb-1">
      <div class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 px-1">Priority</div>
      <div class="flex items-center gap-1.5">
        <button (click)="selectPriority(3)" class="w-[34px] h-[30px] flex items-center justify-center hover:bg-red-50 rounded-[6px] transition-colors group">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-red-500 fill-red-500" fill="currentColor"><path d="M4 2v20M4 4l16 6-16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button (click)="selectPriority(2)" class="w-[34px] h-[30px] flex items-center justify-center hover:bg-orange-50 rounded-[6px] transition-colors group">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-orange-400 fill-orange-400" fill="currentColor"><path d="M4 2v20M4 4l16 6-16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button (click)="selectPriority(1)" class="w-[34px] h-[30px] flex items-center justify-center hover:bg-blue-50 rounded-[6px] transition-colors group">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-blue-500 fill-blue-500" fill="currentColor"><path d="M4 2v20M4 4l16 6-16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button (click)="selectPriority(0)" class="w-[34px] h-[30px] flex items-center justify-center hover:bg-gray-100 rounded-[6px] transition-colors group">
          <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-300" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20M4 4l16 6-16 6"/></svg>
        </button>
      </div>
    </div>

    <!-- List Selection -->
    <button class="flex items-center justify-between px-3 py-2 hover:bg-gray-50 transition-colors w-full text-left group">
      <div class="flex items-center gap-3">
        <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2" /><path d="M3 10h18"/><path d="M8 2v4m8-4v4"/></svg>
        <div class="flex items-center gap-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
          <span class="text-[13px] font-medium text-gray-700">everyday</span>
        </div>
      </div>
      <svg viewBox="0 0 24 24" class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <hr class="border-gray-50 my-1"/>

    <!-- Multi Actions -->
    <button (click)="selectAction('tags')" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-50 transition-colors w-full group">
      <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span class="text-[13px] font-medium text-gray-700">Tags</span>
    </button>

    <button (click)="selectAction('attachment')" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-50 transition-colors w-full group">
      <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      <span class="text-[13px] font-medium text-gray-700">Attachment</span>
    </button>

    <button (click)="selectAction('template')" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-50 transition-colors w-full group">
      <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h6M3 15h6M21 9h-6M21 15h-6"/></svg>
      <span class="text-[13px] font-medium text-gray-700 transition-colors">Add from Template</span>
    </button>

    <hr class="border-gray-50 my-1"/>

    <button (click)="selectAction('settings')" class="flex items-center gap-3 px-3 py-2 hover:bg-gray-50 transition-colors w-full group">
      <svg viewBox="0 0 24 24" class="w-[18px] h-[18px] text-gray-500" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="text-[13px] font-medium text-gray-700">Input Box Setting</span>
    </button>
  </div>
</div>
